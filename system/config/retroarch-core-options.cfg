mupen64plus-43screensize = "640x480"
mupen64plus-169screensize = "640x360"
mupen64plus-aspect = "4:3"
mupen64plus-EnableNativeResFactor = "1"
mupen64plus-ThreadedRenderer = "True"
mupen64plus-BilinearMode = "Standard"
mupen64plus-HybridFilter = "True"
mupen64plus-EnableLODEmulation = "True"
mupen64plus-EnableFBEmulation = "True"
mupen64plus-EnableCopyColorToRDRAM = "DoubleBuffer"
mupen64plus-EnableCopyColorFromRDRAM = "False"
mupen64plus-CorrectTexrectCoords = "Auto"
mupen64plus-EnableInaccurateTextureCoordinates = "True"
mupen64plus-EnableNativeResTexrects = "Optimized"
mupen64plus-EnableLegacyBlending = "True"
mupen64plus-EnableFragmentDepthWrite = "False"
mupen64plus-EnableTextureCache = "False"
mupen64plus-EnableOverscan = "True"
mupen64plus-OverscanTop = "14"
mupen64plus-OverscanLeft = "18"
mupen64plus-OverscanRight = "14"
mupen64plus-OverscanBottom = "14"
mupen64plus-cpucore = "dynamic_recompiler"
mupen64plus-rsp-plugin = "hle"

reicast_enable_dsp = "disabled"
reicast_upnp = "disabled"
reicast_dcnet = "disabled"
reicast_internal_resolution = "320x240"
reicast_alpha_sorting = "per-triangle (normal)"
reicast_auto_skip_frame = "some"
reicast_native_depth_interpolation = "enabled"

pcsx_rearmed_gpu_thread_rendering = "enabled"
pcsx_rearmed_vibration = "enabled"
pcsx_rearmed_analog_combo = "l3+r3"

ppsspp_backend = "vulkan"
